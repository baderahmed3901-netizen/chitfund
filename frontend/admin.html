<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Chitti Update</title>
  <style>
    body { 
      font-family: 'Inter', sans-serif; 
      background: linear-gradient(135deg, #1a1a1a, #2c2c2c); 
      color: #e0e0e0; 
      padding: 40px; 
      min-height: 100vh;
    }

    h2 { 
      margin-bottom: 30px; 
      font-size: 2.2rem; 
      font-weight: 700; 
      text-align: center; 
      color: #ffffff;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }

    #searchBar {
      width: 100%;
      max-width: 600px;
      padding: 15px;
      margin: 0 auto 30px;
      display: block;
      border-radius: 10px;
      border: 1px solid #444;
      font-size: 1.1rem;
      background: #2a2a2a;
      color: #e0e0e0;
      transition: all 0.3s ease;
    }

    #searchBar:focus {
      outline: none;
      border-color: #6200ea;
      box-shadow: 0 0 8px rgba(98, 0, 234, 0.5);
    }

    #forms {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .chitti-form { 
      background: #252525; 
      padding: 25px; 
      border-radius: 15px; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .chitti-form:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 25px rgba(0,0,0,0.4);
    }

    .chitti-form h3 {
      margin-bottom: 20px;
      font-size: 1.5rem;
      color: #bb86fc;
      font-weight: 600;
    }

    input { 
      width: 100%; 
      margin: 12px 0; 
      padding: 12px; 
      border: none; 
      border-radius: 8px; 
      background: #333; 
      color: #e0e0e0; 
      font-size: 1rem;
      transition: background 0.3s ease;
    }

    input:focus {
      outline: none;
      background: #3a3a3a;
      box-shadow: 0 0 5px rgba(98, 0, 234, 0.3);
    }

    button { 
      display: block;
      margin: 30px auto 0;
      padding: 12px 30px;
      background: linear-gradient(45deg, #6200ea, #bb86fc);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: 600;
      transition: background 0.3s ease, transform 0.2s ease;
    }

    button:hover {
      background: linear-gradient(45deg, #7f39fb, #cea8ff);
      transform: scale(1.05);
    }

    button:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <h2>Admin Panel - Update Chitti</h2>
  <input type="text" id="searchBar" placeholder="Search by name..." onkeyup="filterChittis()">
  <div id="forms"></div>
  <button onclick="saveData()">Save Changes</button>

  <script>
    let data = {};
    let filteredData = [];

    async function loadForms() {
      const res = await fetch("https://chit-backend-3im4.onrender.com/chittiData");
      data = await res.json();
      filteredData = data.chittis;
      renderForms();
    }

    function renderForms() {
      const formsDiv = document.getElementById("forms");
      formsDiv.innerHTML = "";

      filteredData.forEach((chitti, i) => {
        formsDiv.innerHTML += `
          <div class="chitti-form">
            <h3>${chitti.name}</h3>
            Total Amount: <input id="total-${i}" value="${chitti.totalAmount}"><br>
            Monthly Payment: <input id="monthly-${i}" value="${chitti.monthlyPayment}"><br>
            Period: <input id="period-${i}" value="${chitti.period}"><br>
            Progress: <input id="progress-${i}" value="${chitti.progress}"><br>
          </div>
        `;
      });
    }

    function filterChittis() {
      const search = document.getElementById("searchBar").value.toLowerCase();
      filteredData = data.chittis.filter(chitti =>
        chitti.name.toLowerCase().includes(search)
      );
      renderForms();
    }

    async function saveData() {
      data.chittis.forEach((chitti, i) => {
        chitti.totalAmount = parseInt(document.getElementById(`total-${i}`)?.value || chitti.totalAmount);
        chitti.monthlyPayment = parseInt(document.getElementById(`monthly-${i}`)?.value || chitti.monthlyPayment);
        chitti.period = parseInt(document.getElementById(`period-${i}`)?.value || chitti.period);
        chitti.progress = parseInt(document.getElementById(`progress-${i}`)?.value || chitti.progress);
      });

      await fetch("https://chit-backend-3im4.onrender.com/chittiData", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      alert("✅ Chitti data updated!");
    }

    loadForms();
  </script>
</body>
</html>
